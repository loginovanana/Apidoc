openapi: 3.0.3

info:
  title: {{ title }}
  description: {{ description }}
  version: {{ version }}
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: {{ server_url }}
    description: {{ server_description }}

paths:
  /example:
    get:
      summary: Example endpoint
      operationId: getExample
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
