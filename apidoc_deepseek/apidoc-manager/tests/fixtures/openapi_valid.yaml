openapi: "3.0.3"
info:
  title: "Valid Test API"
  description: "A valid OpenAPI specification for testing"
  version: "1.0.0"
servers:
  - url: "https://api.example.com/v1"
paths:
  /users:
    get:
      tags: [users]
      summary: "List all users"
      operationId: "listUsers"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [users]
      summary: "Create a new user"
      operationId: "createUser"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: "User created"
components:
  schemas:
    User:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        email: {type: string, format: email}
      required: [id, name, email]
    CreateUserRequest:
      type: object
      properties:
        name: {type: string}
        email: {type: string, format: email}
      required: [name, email]
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
