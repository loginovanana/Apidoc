version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apidoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apidoc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apidoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apidoc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - apidoc-network

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      APIDOC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apidoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-apidoc}
      APIDOC_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APIDOC_SECRET_KEY: ${SECRET_KEY}
      APIDOC_HOST: 0.0.0.0
      APIDOC_PORT: 8000
      APIDOC_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APIDOC_LOG_JSON: "true"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    networks:
      - apidoc-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - apidoc-network
    depends_on:
      - server

networks:
  apidoc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
