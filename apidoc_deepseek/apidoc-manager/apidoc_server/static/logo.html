<!-- apidoc_server/static/logo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIDoc Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Анимированные частицы на фоне */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Основной контейнер */
        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        /* SVG логотип */
        .logo-wrapper {
            display: inline-block;
            animation: logoAppear 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 10px 30px rgba(255, 182, 193, 0.3));
        }

        @keyframes logoAppear {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .logo-wrapper svg {
            width: 400px;
            height: 400px;
        }

        /* Текст под логотипом */
        .subtitle {
            margin-top: 20px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        .subtitle p {
            color: #cfcfcf;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Кнопки навигации */
        .nav-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.8s both;
        }

        .nav-link {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-link.primary {
            background: linear-gradient(135deg, #ffb6c1, #ff8fa3);
            color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(255, 182, 193, 0.3);
        }

        .nav-link.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 182, 193, 0.5);
        }

        .nav-link.secondary {
            background: transparent;
            color: #ffb6c1;
            border: 2px solid #ffb6c1;
        }

        .nav-link.secondary:hover {
            background: rgba(255, 182, 193, 0.1);
            transform: translateY(-2px);
        }

        /* Статус сервера */
        .server-status {
            margin-top: 30px;
            animation: fadeInUp 1s ease 1s both;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #27c93f;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(39, 201, 63, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(39, 201, 63, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(39, 201, 63, 0);
            }
        }

        .status-text {
            color: #cfcfcf;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .logo-wrapper svg {
                width: 280px;
                height: 280px;
            }
            
            .subtitle h1 {
                font-size: 22px;
            }
            
            .nav-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

    <script>
        // Создание анимированных частиц на фоне
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#ffb6c1', '#6699cc', '#cc8800', '#ff8fa3', '#4a7aa8'];
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const delay = Math.random() * 15;
                const duration = Math.random() * 10 + 10;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.backgroundColor = color;
                particle.style.left = left + '%';
                particle.style.animationDelay = delay + 's';
                particle.style.animationDuration = duration + 's';
                particle.style.boxShadow = `0 0 ${size * 3}px ${color}`;
                
                container.appendChild(particle);
            }
        }

        // Проверка статуса сервера
        async function checkServerStatus() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.status === 'healthy') {
                    document.getElementById('statusText').textContent = 
                        `Server is running • v${data.version} • ${new Date(data.timestamp).toLocaleTimeString()}`;
                }
            } catch (e) {
                document.getElementById('statusText').textContent = 'Checking server status...';
            }
        }

        // Запуск при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            checkServerStatus();
            // Периодическая проверка статуса
            setInterval(checkServerStatus, 30000);
        });
    </script>
</body>
</html>
