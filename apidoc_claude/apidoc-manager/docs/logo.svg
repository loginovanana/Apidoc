<svg width="680" height="320" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>APIDoc Manager CLI</title>
  <desc>Logo for APIDoc Manager CLI - OpenAPI specification management tool</desc>
  <defs>
    <style>
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dot1 { offset-path: path("M 220 155 Q 260 120 300 155"); animation: flow 3s linear infinite; }
      .dot2 { offset-path: path("M 220 155 Q 260 120 300 155"); animation: flow 3s linear infinite 0.7s; }
      .dot3 { offset-path: path("M 220 185 Q 260 220 300 185"); animation: flow 3s linear infinite 0.35s; }
      .dot4 { offset-path: path("M 220 185 Q 260 220 300 185"); animation: flow 3s linear infinite 1.05s; }
      .dot5 { offset-path: path("M 380 155 Q 420 120 460 155"); animation: flow 3s linear infinite 0.5s; }
      .dot6 { offset-path: path("M 380 155 Q 420 120 460 155"); animation: flow 3s linear infinite 1.2s; }
      .dot7 { offset-path: path("M 380 185 Q 420 220 460 185"); animation: flow 3s linear infinite 0.9s; }
      .rotate-ring { animation: rotate 12s linear infinite; transform-origin: 340px 155px; }
      .drift { animation: drift 4s ease-in-out infinite alternate; }
      @keyframes pulse { 0%,100%{opacity:.55}50%{opacity:1} }
      @keyframes flow { 0%{opacity:0;offset-distance:0%}10%{opacity:1}85%{opacity:1}100%{opacity:0;offset-distance:100%} }
      @keyframes rotate { to{transform:rotate(360deg)} }
      @keyframes drift { from{transform:translateY(-3px)}to{transform:translateY(3px)} }
    </style>
    <clipPath id="hex-clip">
      <polygon points="340,68 401,100 401,210 340,242 279,210 279,100"/>
    </clipPath>
  </defs>
  <!-- Outer ring -->
  <g class="rotate-ring" opacity="0.25">
    <circle cx="340" cy="155" r="130" fill="none" stroke="#ffb6c1" stroke-width="0.8" stroke-dasharray="6,10"/>
    <circle cx="340" cy="25"  r="4" fill="#ffb6c1"/>
    <circle cx="340" cy="285" r="4" fill="#ffb6c1"/>
    <circle cx="210" cy="155" r="4" fill="#6699cc"/>
    <circle cx="470" cy="155" r="4" fill="#6699cc"/>
  </g>
  <!-- Data particles -->
  <circle class="dot1" r="3.5" fill="#ffb6c1"/>
  <circle class="dot2" r="3"   fill="#ffb6c1" opacity=".7"/>
  <circle class="dot3" r="3.5" fill="#6699cc"/>
  <circle class="dot4" r="3"   fill="#6699cc" opacity=".7"/>
  <circle class="dot5" r="3.5" fill="#ffb6c1"/>
  <circle class="dot6" r="3"   fill="#cc8800"/>
  <circle class="dot7" r="3.5" fill="#6699cc"/>
  <!-- Connector lines -->
  <path d="M 220 155 Q 260 120 300 155" fill="none" stroke="#ffb6c1" stroke-width="1.2" opacity=".3" stroke-dasharray="4,5"/>
  <path d="M 220 185 Q 260 220 300 185" fill="none" stroke="#6699cc" stroke-width="1.2" opacity=".3" stroke-dasharray="4,5"/>
  <path d="M 380 155 Q 420 120 460 155" fill="none" stroke="#ffb6c1" stroke-width="1.2" opacity=".3" stroke-dasharray="4,5"/>
  <path d="M 380 185 Q 420 220 460 185" fill="none" stroke="#6699cc" stroke-width="1.2" opacity=".3" stroke-dasharray="4,5"/>
  <path d="M 380 170 L 460 170" fill="none" stroke="#cc8800" stroke-width="1.2" opacity=".3" stroke-dasharray="4,5"/>
  <!-- Left source blocks -->
  <rect x="148" y="110" width="66" height="22" rx="4" fill="#2a1e10" stroke="#cfcfcf" stroke-width=".7"/>
  <text x="181" y="125.5" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#cc8800">VAL</text>
  <rect x="148" y="140" width="66" height="22" rx="4" fill="#1a2e1a" stroke="#cfcfcf" stroke-width=".7"/>
  <text x="181" y="155.5" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#4caf50">GET</text>
  <rect x="148" y="170" width="66" height="22" rx="4" fill="#1a1a2e" stroke="#cfcfcf" stroke-width=".7"/>
  <text x="181" y="185.5" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#6699cc">POST</text>
  <!-- Central hexagon -->
  <g class="drift">
    <polygon points="340,68 401,100 401,210 340,242 279,210 279,100" fill="#1a0a12" stroke="#ffb6c1" stroke-width="2"/>
    <polygon points="340,80 393,110 393,200 340,230 287,200 287,110" fill="none" stroke="#ffb6c1" stroke-width=".5" opacity=".3"/>
    <rect x="315" y="110" width="40" height="52" rx="3" fill="#cfcfcf" opacity=".12"/>
    <rect x="315" y="110" width="40" height="52" rx="3" fill="none" stroke="#cfcfcf" stroke-width="1" opacity=".5"/>
    <polyline points="343,110 355,110 355,122 343,122 343,110" fill="none" stroke="#ffb6c1" stroke-width="1" opacity=".7"/>
    <line x1="322" y1="130" x2="348" y2="130" stroke="#ffb6c1" stroke-width="1.2" opacity=".8"/>
    <line x1="322" y1="138" x2="348" y2="138" stroke="#cfcfcf" stroke-width=".8" opacity=".5"/>
    <line x1="322" y1="146" x2="342" y2="146" stroke="#cfcfcf" stroke-width=".8" opacity=".5"/>
    <text x="340" y="186" text-anchor="middle" font-family="monospace" font-size="20" font-weight="700" fill="#ffb6c1" letter-spacing="3" opacity=".95">api</text>
    <rect x="279" y="0" width="122" height="3" fill="#ffb6c1" opacity=".07" clip-path="url(#hex-clip)">
      <animateTransform attributeName="transform" type="translate" from="0,68" to="0,242" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Right output blocks -->
  <rect x="466" y="110" width="68" height="22" rx="4" fill="#2a1e10" stroke="#cfcfcf" stroke-width=".7"/>
  <text x="500" y="125.5" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#cc8800">MOCK</text>
  <rect x="466" y="140" width="68" height="22" rx="4" fill="#1a2e1a" stroke="#cfcfcf" stroke-width=".7"/>
  <text x="500" y="155.5" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#4caf50">YAML</text>
  <rect x="466" y="170" width="68" height="22" rx="4" fill="#1a1a2e" stroke="#cfcfcf" stroke-width=".7"/>
  <text x="500" y="185.5" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#6699cc">JSON</text>
  <!-- Brand text -->
  <text x="340" y="268" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#ffb6c1">APIDOC</text>
  <text x="340" y="288" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="400" letter-spacing="4" fill="#cfcfcf" opacity=".7">MANAGER  CLI</text>
  <!-- Status dot -->
  <circle cx="340" cy="305" r="3.5" fill="#4caf50" class="pulse"/>
</svg>
